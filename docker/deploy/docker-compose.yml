# Production deployment — works out of the box on any host.
# Usage: docker compose -f docker/deploy/docker-compose.yml up -d
# Then access the MCP server at http://localhost:8080

services:
  mcp:
    build:
      context: ../..
      dockerfile: Dockerfile.mcp
    container_name: open-computer-use
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OPEN_CU_BACKEND=linux-x11
      - DISPLAY=:99
    # tmpfs mounts prevent Chromium cache/profile buildup in overlay2 storage.
    # All ephemeral data lives in RAM — zero disk growth, auto-cleaned on restart.
    tmpfs:
      - /home/testuser/.cache:size=300M,mode=1777
      - /home/testuser/.config/chromium:size=200M,mode=0700,uid=1000,gid=1000
      - /tmp:size=100M,mode=1777
