services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: gsd-computer-use
    restart: unless-stopped
    environment:
      - GSD_CU_BACKEND=linux-x11
      - DISPLAY=:99
    # tmpfs mounts prevent Chromium cache/profile buildup in overlay2 storage.
    # All ephemeral data lives in RAM — zero disk growth, auto-cleaned on restart.
    tmpfs:
      - /home/testuser/.cache:size=300M,mode=1777
      - /home/testuser/.config/chromium:size=200M,mode=0700,uid=1000,gid=1000
      - /tmp:size=100M,mode=1777
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gsd-mcp.rule=Host(`gsd-mcp.local.tophormayor.com`)"
      - "traefik.http.routers.gsd-mcp.entrypoints=websecure"
      - "traefik.http.routers.gsd-mcp.tls=true"
      - "traefik.http.routers.gsd-mcp.tls.certresolver=cloudflare"
      - "traefik.http.routers.gsd-mcp.middlewares=local-only@file"
      - "traefik.http.services.gsd-mcp.loadbalancer.server.port=8080"

networks:
  proxy-net:
    external: true
