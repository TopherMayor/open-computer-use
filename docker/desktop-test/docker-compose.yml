services:
  contract-tests:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    working_dir: /home/testuser/repo
    command: python3 -m pytest tests/test_mcp_contract.py tests/test_unit_coverage.py -v
    environment:
      - GSD_CU_BACKEND=fake
      - PYTHONPATH=/home/testuser/repo
    mem_limit: 512m
    cpus: 1

  desktop-tests:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    working_dir: /home/testuser/repo
    command: >
      bash -c "
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 0.5
        openbox &
        dbus-launch --exit-with-session python3 tests/fixtures/desktop_app.py &
        sleep 2
        DISPLAY=:99 GSD_CU_BACKEND=linux-x11 python3 -m pytest tests/test_desktop_smoke.py -v
      "
    environment:
      - DISPLAY=:99
      - GSD_CU_BACKEND=linux-x11
      - PYTHONPATH=/home/testuser/repo
    mem_limit: 1g
    cpus: 2

  desktop-tests-recorded:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    user: "0:0"
    working_dir: /home/testuser/repo
    command: >
      bash -c "
        mkdir -p /tmp/runtime-root
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 0.5
        openbox &
        dbus-launch --exit-with-session python3 tests/fixtures/desktop_app.py &
        sleep 2
        ffmpeg -y -video_size 1280x800 -framerate 10 -f x11grab -i :99 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 28 /home/testuser/repo/test-recordings/desktop-test.mp4 </dev/null >/tmp/ffmpeg.log 2>&1 &
        FFMPEG_PID=$!
        DISPLAY=:99 GSD_CU_BACKEND=linux-x11 python3 -m pytest tests/test_desktop_smoke.py -v
        TEST_EXIT=$?
        sleep 1
        kill -INT $FFMPEG_PID 2>/dev/null
        sleep 3
        echo 'ffmpeg last lines:' && tail -3 /tmp/ffmpeg.log
        ls -lh /home/testuser/repo/test-recordings/desktop-test.mp4
        exit $TEST_EXIT
      "
    environment:
      - DISPLAY=:99
      - GSD_CU_BACKEND=linux-x11
      - PYTHONPATH=/home/testuser/repo
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    volumes:
      - ../../test-recordings:/home/testuser/repo/test-recordings
    mem_limit: 1g
    cpus: 2

  live-tests-recorded:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    working_dir: /home/testuser/repo
    command: >
      bash -c "
        mkdir -p /tmp/runtime-testuser
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 0.5
        openbox &
        dbus-launch --exit-with-session python3 tests/fixtures/desktop_app.py &
        sleep 3
        ffmpeg -y -video_size 1280x800 -framerate 10 -f x11grab -i :99 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 28 /tmp/live-test-raw.mp4 </dev/null >/tmp/ffmpeg.log 2>&1 &
        FFMPEG_PID=$!
        DISPLAY=:99 GSD_CU_BACKEND=linux-x11 python3 -m pytest tests/test_linux_desktop_live.py -v --tb=short
        TEST_EXIT=$?
        sleep 1
        kill -INT $FFMPEG_PID 2>/dev/null
        sleep 3
        echo '=== ffmpeg last lines ===' && tail -3 /tmp/ffmpeg.log
        cp /tmp/live-test-raw.mp4 /home/testuser/repo/test-recordings/live-test.mp4
        echo '=== Recording artifact ===' && ls -lh /home/testuser/repo/test-recordings/live-test.mp4
        exit $TEST_EXIT
      "
    environment:
      - DISPLAY=:99
      - GSD_CU_BACKEND=linux-x11
      - PYTHONPATH=/home/testuser/repo
      - XDG_RUNTIME_DIR=/tmp/runtime-testuser
    volumes:
      - ../../test-recordings:/home/testuser/repo/test-recordings
    mem_limit: 1g
    cpus: 2

  browser-kayak-test:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    working_dir: /home/testuser/repo
    command: >
      bash -c "
        mkdir -p /tmp/runtime-testuser
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 0.5
        openbox &
        sleep 0.5
        echo 'Starting Firefox browser test...'
        ffmpeg -y -video_size 1280x800 -framerate 10 -f x11grab -i :99 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 28 /tmp/browser-kayak-raw.mp4 </dev/null >/tmp/ffmpeg.log 2>&1 &
        FFMPEG_PID=$!
        DISPLAY=:99 GSD_CU_BACKEND=linux-x11 python3 -m pytest tests/test_browser_kayak.py -v --tb=short -s
        TEST_EXIT=$$?
        sleep 1
        kill -INT $$FFMPEG_PID 2>/dev/null
        sleep 3
        echo '=== ffmpeg last lines ===' && tail -3 /tmp/ffmpeg.log
        cp /tmp/browser-kayak-raw.mp4 /home/testuser/repo/test-recordings/browser-kayak.mp4
        echo '=== Recording artifact ===' && ls -lh /home/testuser/repo/test-recordings/browser-kayak.mp4
        exit $$TEST_EXIT
      "
    environment:
      - DISPLAY=:99
      - GSD_CU_BACKEND=linux-x11
      - PYTHONPATH=/home/testuser/repo
      - XDG_RUNTIME_DIR=/tmp/runtime-testuser
      - HOME=/home/testuser
    volumes:
      - ../../test-recordings:/home/testuser/repo/test-recordings
    mem_limit: 2g
    cpus: 2

  novnc-debug:
    build:
      context: ../..
      dockerfile: docker/desktop-test/Dockerfile
    ports:
      - "6080:6080"
    working_dir: /home/testuser/repo
    command: >
      bash -c "
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 0.5
        openbox &
        x11vnc -display :99 -forever -nopw &
        novnc --listen 6080 &
        dbus-launch --exit-with-session python3 tests/fixtures/desktop_app.py &
        sleep infinity
      "
    environment:
      - DISPLAY=:99
    mem_limit: 1g
    cpus: 2
